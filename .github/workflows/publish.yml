name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish All Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Investigate and Build
        run: |
          # 1. Minecraft 26.1以上のリリースを調査 & JSON更新
          python3 update_versions.py
          
          # 2. Micecraftバージョン(all) + タグ名を引数に渡してビルド
          chmod +x build.sh
          ./build.sh all "${{ github.event.release.tag_name }}"

      - name: Prepare Publish Scripts
        run: |
          pip install requests

      - name: Publish to Modrinth (Delete if exists)
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          CHANGELOG: ${{ github.event.release.body }}
        run: |
          # PythonスクリプトでModrinthの既存バージョンを削除してから投稿
          python3 publish_to_modrinth.py

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id:  ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: dist/**/*.jar
          name: "${{ github.event.release.name }}"
          version: "${{ github.event.release.tag_name }}"
          version-type: release
          changelog: "${{ github.event.release.body }}"
          # 既に存在する場合にジョブを落とさない設定
          fail-mode: warn

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*.jar
          tag_name: ${{ github.event.release.tag_name }}
