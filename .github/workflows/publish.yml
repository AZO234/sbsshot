# .github/workflows/publish.yml
#
# GitHub Release を公開したときに自動実行:
#   1. Forge / NeoForge / Fabric を並列ビルド
#   2. Modrinth・CurseForge・GitHub Releases へアップロード
#
# 必要な Repository Secrets (Settings → Secrets → Actions):
#   MODRINTH_TOKEN   : Modrinth のユーザー設定 → API トークン
#   CURSEFORGE_TOKEN : CurseForge の API キー
#
# 必要な Repository Variables (Settings → Variables → Actions):
#   MODRINTH_ID_FORGE      : ModrinthのプロジェクトID（ForgeとNeoForgeで同プロジェクトなら同じ値）
#   MODRINTH_ID_NEOFORGE   : 同上（別プロジェクトにする場合は別の値）
#   MODRINTH_ID_FABRIC     : Modrinth の Fabric プロジェクト ID
#   CURSEFORGE_ID_FORGE    : CurseForge のプロジェクト ID (数字)
#   CURSEFORGE_ID_NEOFORGE : 同上
#   CURSEFORGE_ID_FABRIC   : 同上

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write   # GitHub Releases へのアセット添付に必要

jobs:

  # ---------------------------------------------------------------------------
  # Forge ビルド & アップロード
  # ---------------------------------------------------------------------------
  publish-forge:
    name: Publish Forge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build (Forge)
        run: |
          chmod +x forge/gradlew
          cd forge && ./gradlew build --no-daemon

      - name: Publish (Forge)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- Modrinth ---
          modrinth-id:    ${{ vars.MODRINTH_ID_FORGE }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true

          # --- CurseForge ---
          curseforge-id:    ${{ vars.CURSEFORGE_ID_FORGE }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- GitHub Releases ---
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # --- 共通メタデータ ---
          files:           forge/build/libs/!(*-@(dev|sources|javadoc)).jar
          name:            ${{ github.event.release.name }} [Forge]
          version:         ${{ github.event.release.tag_name }}
          version-type:    release
          changelog:       ${{ github.event.release.body }}
          loaders:         forge
          game-versions:   1.20.1

  # ---------------------------------------------------------------------------
  # NeoForge ビルド & アップロード
  # ---------------------------------------------------------------------------
  publish-neoforge:
    name: Publish NeoForge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build (NeoForge)
        run: |
          chmod +x neoforge/gradlew
          cd neoforge && ./gradlew build --no-daemon

      - name: Publish (NeoForge)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id:    ${{ vars.MODRINTH_ID_NEOFORGE }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true

          curseforge-id:    ${{ vars.CURSEFORGE_ID_NEOFORGE }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}

          files:           neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
          name:            ${{ github.event.release.name }} [NeoForge]
          version:         ${{ github.event.release.tag_name }}
          version-type:    release
          changelog:       ${{ github.event.release.body }}
          loaders:         neoforge
          game-versions:   26.1

  # ---------------------------------------------------------------------------
  # Fabric ビルド & アップロード
  # ---------------------------------------------------------------------------
  publish-fabric:
    name: Publish Fabric
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build (Fabric)
        run: |
          chmod +x fabric/gradlew
          cd fabric && ./gradlew build --no-daemon

      - name: Publish (Fabric)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id:    ${{ vars.MODRINTH_ID_FABRIC }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true

          curseforge-id:    ${{ vars.CURSEFORGE_ID_FABRIC }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}

          files:           fabric/build/libs/!(*-@(dev|sources|javadoc)).jar
          name:            ${{ github.event.release.name }} [Fabric]
          version:         ${{ github.event.release.tag_name }}
          version-type:    release
          changelog:       ${{ github.event.release.body }}
          loaders:         fabric
          game-versions:   26.1
