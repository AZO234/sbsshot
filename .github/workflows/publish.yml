# .github/workflows/publish.yml
#
# GitHub Release を公開したときに自動実行:
#   1. NeoForge / Fabric × 指定した MC バージョンを行列で並列ビルド
#   2. Modrinth・CurseForge・GitHub Releases へアップロード
#
# 必要な Repository Secrets (Settings → Secrets → Actions):
#   MODRINTH_TOKEN   : Modrinth のユーザー設定 → API トークン
#   CURSEFORGE_TOKEN : CurseForge の API キー
#
# 必要な Repository Variables (Settings → Variables → Actions):
#   MODRINTH_ID_NEOFORGE   : Modrinth の NeoForge プロジェクト ID
#   MODRINTH_ID_FABRIC     : Modrinth の Fabric プロジェクト ID
#   CURSEFORGE_ID_NEOFORGE : CurseForge の NeoForge プロジェクト ID
#   CURSEFORGE_ID_FABRIC   : CurseForge の Fabric プロジェクト ID

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write   # GitHub Releases へのアセット添付に必要

jobs:

  publish:
    name: Publish ${{ matrix.loader }} (${{ matrix.mc_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        loader: [neoforge, fabric]
        mc_version:
          - "26.1.2"
          - "26.1.1"
          - "26.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build (${{ matrix.loader }})
        run: |
          chmod +x ${{ matrix.loader }}/gradlew
          cd ${{ matrix.loader }} && ./gradlew build --no-daemon

      - name: Resolve publish IDs
        id: ids
        run: |
          if [ "${{ matrix.loader }}" = "neoforge" ]; then
            echo "modrinth_id=${{ vars.MODRINTH_ID_NEOFORGE }}"   >> "$GITHUB_OUTPUT"
            echo "curseforge_id=${{ vars.CURSEFORGE_ID_NEOFORGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "modrinth_id=${{ vars.MODRINTH_ID_FABRIC }}"     >> "$GITHUB_OUTPUT"
            echo "curseforge_id=${{ vars.CURSEFORGE_ID_FABRIC }}"  >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (${{ matrix.loader }} / ${{ matrix.mc_version }})
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id:    ${{ steps.ids.outputs.modrinth_id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true

          curseforge-id:    ${{ steps.ids.outputs.curseforge_id }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # GitHub Releases へのアセット添付は mc_version ごとに重複しないよう
          # 行列の最初のバージョンのみで行う
          github-token: ${{ matrix.mc_version == '1.21.5' && secrets.GITHUB_TOKEN || '' }}

          files:        ${{ matrix.loader }}/build/libs/!(*-@(dev|sources|javadoc)).jar
          name:         ${{ github.event.release.name }} [${{ matrix.loader == 'neoforge' && 'NeoForge' || 'Fabric' }}]
          version:      ${{ github.event.release.tag_name }}
          version-type: release
          changelog:    ${{ github.event.release.body }}
          loaders:      ${{ matrix.loader }}
          game-versions: ${{ matrix.mc_version }}
